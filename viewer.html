<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Door Model Viewer</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #f4f1ea;
        color: #1f2933;
        font-family: Arial, sans-serif;
      }

      #viewer {
        width: 100%;
        height: 100%;
      }

      .toolbar {
        position: fixed;
        left: 16px;
        top: 16px;
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 10px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(31, 41, 51, 0.14);
        border-radius: 8px;
        box-shadow: 0 10px 28px rgba(31, 41, 51, 0.14);
      }

      button {
        height: 34px;
        padding: 0 12px;
        border: 1px solid #c9b89d;
        border-radius: 6px;
        background: #ffffff;
        color: #1f2933;
        font-size: 14px;
        cursor: pointer;
      }

      button:hover {
        background: #f7efe3;
      }

      .status {
        min-width: 112px;
        font-size: 13px;
        color: #52616f;
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <div class="toolbar">
      <button id="reset" type="button" title="視点を初期位置へ戻す">Reset</button>
      <button id="toggle-spin" type="button" title="自動回転を切り替える">Spin</button>
      <span id="status" class="status">Loading...</span>
    </div>

    <script type="module" src="/src/viewer.js"></script>
  </body>
</html>
