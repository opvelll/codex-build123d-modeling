<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Door Model Viewer</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #eef2f1;
        color: #1f2933;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      #viewer {
        width: 100%;
        height: 100%;
      }

      .toolbar {
        position: fixed;
        left: 16px;
        top: 16px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        width: min(340px, calc(100vw - 32px));
        padding: 10px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(31, 41, 51, 0.14);
        border-radius: 8px;
        box-shadow: 0 10px 28px rgba(31, 41, 51, 0.14);
        backdrop-filter: blur(10px);
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      button,
      label.toggle {
        height: 34px;
        padding: 0 12px;
        border: 1px solid #a9b7b2;
        border-radius: 6px;
        background: #ffffff;
        color: #1f2933;
        font-size: 14px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      button:hover,
      label.toggle:hover {
        background: #edf7f4;
      }

      .status {
        margin-left: auto;
        font-size: 13px;
        color: #52616f;
      }

      .meta {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        color: #36454f;
        font-size: 12px;
      }

      .metric {
        border-top: 1px solid rgba(31, 41, 51, 0.12);
        padding-top: 8px;
      }

      #overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      .label {
        position: absolute;
        transform: translate(-50%, -50%);
        padding: 5px 8px;
        border: 1px solid rgba(28, 72, 80, 0.22);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.88);
        color: #18343a;
        font-size: 12px;
        line-height: 1;
        box-shadow: 0 6px 18px rgba(24, 52, 58, 0.14);
        white-space: nowrap;
      }

      .label::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 100%;
        width: 1px;
        height: 22px;
        background: rgba(28, 72, 80, 0.42);
      }

      @media (max-width: 520px) {
        .toolbar {
          left: 10px;
          top: 10px;
          width: calc(100vw - 20px);
        }

        button,
        label.toggle {
          height: 32px;
          padding: 0 9px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <div id="overlay"></div>
    <div class="toolbar">
      <div class="row">
        <button id="reset" type="button" title="視点を初期位置へ戻す">Reset</button>
        <button id="toggle-spin" type="button" title="自動回転を切り替える">Spin</button>
        <label class="toggle" title="注釈を切り替える">
          <input id="toggle-labels" type="checkbox" checked />
          Labels
        </label>
        <span id="status" class="status">Loading...</span>
      </div>
      <div class="row">
        <button class="view-preset" data-view="front" type="button">Front</button>
        <button class="view-preset" data-view="angle" type="button">Angle</button>
        <button class="view-preset" data-view="hardware" type="button">Hardware</button>
      </div>
      <div class="meta">
        <span class="metric">Parts <strong id="part-count">-</strong></span>
        <span class="metric">Height <strong>2100 mm</strong></span>
      </div>
    </div>

    <script type="module" src="/src/viewer.js"></script>
  </body>
</html>
